<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>teamSH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #e8e8e8;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 500; color: #555;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 6px; }
    .email { font-size: 14px; color: #888; margin-bottom: 32px; }
    .btn {
      display: block; width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px; font-weight: 500;
      cursor: pointer; border: none;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #1DB954; color: #fff; }
    .btn-outline {
      background: #fff; color: #333;
      border: 1px solid #ddd;
    }
    .login-title { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .login-sub { font-size: 15px; color: #888; margin-bottom: 32px; }
    .spotify-icon { margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="card">
    {% if user %}
      <!-- 로그인된 상태 -->
      <div class="avatar">
        {% if user.image %}
          <img src="{{ user.image }}" alt="프로필">
        {% else %}
          {{ user.display_name[0].upper() }}
        {% endif %}
      </div>
      <h1>{{ user.display_name }}</h1>
      <p class="email">{{ user.email }}</p>
      <a href="/playlists" class="btn btn-green">내 플레이리스트 보기</a>
      <a href="/logout" class="btn btn-outline">로그아웃</a>

    {% else %}
      <!-- 로그인 전 -->
      <div class="spotify-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="#1DB954">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
      </div>
      <p class="login-title">teamSH</p>
      <p class="login-sub">Spotify 계정으로 로그인하세요</p>
      <a href="/auth/spotify" class="btn btn-green">Spotify로 로그인</a>
    {% endif %}
  </div>
</body>
</html>
